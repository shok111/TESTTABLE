<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Форма</title>
</head>
<body>

<!-- iframe чтобы не было перезагрузки -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<form 
  action="https://script.google.com/macros/s/AKfycbycUBV2AJRWj-rOjfOqPW319PExluJltXk_8CV8YqQ9mrpG27jgZHDnZd75n_xFYI6zsQ/exec"
  method="POST"
  target="hiddenFrame"
  id="mainForm"
>

<input type="date" name="Дата" id="myDate"><br><br>

<!-- клиент -->
<input type="text" name="name" id="input1" placeholder="Клиент" list="datalist1">
<br><br>

<!-- товары -->
<div id="items">
  <input type="text" name="Товар1" placeholder="Товар" list="datalist2">
  <input type="text" name="Кількість1" placeholder="Кількість"><br><br>
</div>

<button type="button" onclick="addField()">+</button>

<br><br>

<input type="hidden" name="form" id="formType">

<button type="submit" onclick="setType('myForm')">Продажа</button>
<button type="submit" onclick="setType('myForm2')">Приход</button>

</form>

<!-- datalist (ОДИН РАЗ!) -->
<datalist id="datalist1"></datalist>
<datalist id="datalist2"></datalist>

<script>
const app = "https://script.google.com/macros/s/AKfycbycUBV2AJRWj-rOjfOqPW319PExluJltXk_8CV8YqQ9mrpG27jgZHDnZd75n_xFYI6zsQ/exec";

// дата
document.getElementById('myDate').valueAsDate = new Date();

// тип формы
function setType(type){
  document.getElementById("formType").value = type;
}

// добавление товаров
let count = 1;
function addField(){
  count++;
  let div = document.createElement("div");
  div.innerHTML = `
    <input type="text" name="Товар${count}" placeholder="Товар" list="datalist2">
    <input type="text" name="Кількість${count}" placeholder="Кількість"><br><br>
  `;
  document.getElementById("items").appendChild(div);
}

// 🔥 JSONP загрузка (без CORS)
function loadData(data){
  let dl1 = document.getElementById('datalist1');
  let dl2 = document.getElementById('datalist2');

  data.clients.forEach(c => {
    let o = document.createElement("option");
    o.value = c;
    dl1.appendChild(o);
  });

  data.products.forEach(p => {
    let o = document.createElement("option");
    o.value = p;
    dl2.appendChild(o);
  });
}

// подключаем GAS как script
let script = document.createElement("script");
script.src = app + "?callback=loadData";
document.body.appendChild(script);

</script>

</body>
</html>
