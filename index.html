<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Форма</title>
</head>
<body>

<!-- iframe чтобы не было перезагрузки -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<form 
  action="https://script.google.com/macros/s/AKfycbwThPBYjyZUF3u5B-fcD2XhntRHbjU2aMjtae67YCGEpGwxuPs1TmFKrZZPS09tByvKKQ/exec"
  method="POST"
  target="hiddenFrame"
  id="mainForm"
>

<input type="date" name="Дата" id="myDate"><br><br>

<!-- клиент -->
<input type="text" name="name" id="input1" placeholder="Клиент" list="datalist1">
<br><br>

<!-- товары -->
<div id="items">
  <input type="text" name="Товар1" placeholder="Товар" list="datalist2">
  <input type="text" name="Кількість1" placeholder="Кількість"><br><br>
</div>

<button type="button" onclick="addField()">+</button>
<br><br>

<input type="hidden" name="form" id="formType">

<button type="submit" onclick="setType('myForm')">Продажа</button>
<button type="submit" onclick="setType('myForm2')">Приход</button>

</form>

<!-- datalist -->
<datalist id="datalist1"></datalist>
<datalist id="datalist2"></datalist>

<script>

// Вставь сюда ссылку на свой GAS скрипт
const app = "https://script.google.com/macros/s/AKfycbwThPBYjyZUF3u5B-fcD2XhntRHbjU2aMjtae67YCGEpGwxuPs1TmFKrZZPS09tByvKKQ/exec";

// Функция получения данных (JSONP)
function loadData(data) {
  console.log("Данные пришли:", data);
  
  const dl1 = document.getElementById('datalist1');
  const dl2 = document.getElementById('datalist2');

  // Очистка старых опций
  dl1.innerHTML = "";
  dl2.innerHTML = "";

  if (!data.clients || !data.products) {
    console.error("В данных нет clients или products!", data);
    return;
  }

  data.clients.forEach(c => {
    let o = document.createElement("option");
    o.value = c;
    dl1.appendChild(o);
  });

  data.products.forEach(p => {
    let o = document.createElement("option");
    o.value = p;
    dl2.appendChild(o);
  });

  console.log("Списки клиентов и товаров обновлены");
}

// Автозагрузка данных из GAS
(function() {
  const script = document.createElement("script");
  script.src = app + "?callback=loadData&t=" + Date.now();
  script.onerror = function() {
    console.error("Не удалось загрузить скрипт! Проверьте права доступа GAS.");
  };
  document.head.appendChild(script);
})();

// Функции добавления поля и установки типа формы
function addField() {
  const itemsDiv = document.getElementById("items");
  const count = itemsDiv.querySelectorAll("input[name^='Товар']").length + 1;

  const html = `
    <input type="text" name="Товар${count}" placeholder="Товар" list="datalist2">
    <input type="text" name="Кількість${count}" placeholder="Кількість"><br><br>
  `;
  itemsDiv.insertAdjacentHTML("beforeend", html);
}

function setType(type) {
  document.getElementById("formType").value = type;
}

</script>
</body>
</html>
