<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Форма продажи/прихода</title>
</head>
<body>

<form id="mainForm">

  <input type="date" name="Дата" id="myDate"><br><br>

  <!-- клиент -->
  <input type="text" name="name" id="input1" placeholder="Клиент" list="datalist1">
  <br><br>

  <!-- товары -->
  <div id="items">
    <input type="text" name="Товар1" placeholder="Товар" list="datalist2">
    <input type="text" name="Кількість1" placeholder="Кількість"><br><br>
  </div>

  <button type="button" onclick="addField()">+</button>
  <br><br>

  <input type="hidden" name="form" id="formType">

  <button type="button" onclick="submitForm('myForm')">Продажа</button>
  <button type="button" onclick="submitForm('myForm2')">Приход</button>

</form>

<!-- datalist -->
<datalist id="datalist1"></datalist>
<datalist id="datalist2"></datalist>

<script>
// Ссылка на твой GAS exec URL
const app = "https://script.google.com/macros/s/ВАШ_ID_ТАБЛИЦЫ/exec";

// Функция загрузки данных (JSONP)
function loadData(data) {
  const dl1 = document.getElementById('datalist1');
  const dl2 = document.getElementById('datalist2');

  dl1.innerHTML = "";
  dl2.innerHTML = "";

  if (!data.clients || !data.products) return;

  data.clients.forEach(c => {
    let o = document.createElement("option");
    o.value = c;
    dl1.appendChild(o);
  });

  data.products.forEach(p => {
    let o = document.createElement("option");
    o.value = p;
    dl2.appendChild(o);
  });
}

// Загрузка клиентов и товаров через JSONP
(function() {
  const script = document.createElement("script");
  script.src = app + "?callback=loadData&t=" + Date.now();
  script.onerror = () => console.error("Не удалось загрузить данные из GAS");
  document.head.appendChild(script);
})();

// Добавление нового поля товара
function addField() {
  const itemsDiv = document.getElementById("items");
  const count = itemsDiv.querySelectorAll("input[name^='Товар']").length + 1;

  const html = `
    <input type="text" name="Товар${count}" placeholder="Товар" list="datalist2">
    <input type="text" name="Кількість${count}" placeholder="Кількість"><br><br>
  `;
  itemsDiv.insertAdjacentHTML("beforeend", html);
}

// Отправка формы через fetch
function submitForm(type) {
  document.getElementById("formType").value = type;

  const form = document.getElementById("mainForm");
  const formData = new FormData(form);

  fetch(app, {
    method: "POST",
    body: formData
  })
  .then(response => response.text())
  .then(text => alert(text))
  .catch(err => console.error("Ошибка отправки формы:", err));
}
</script>
</body>
</html>
