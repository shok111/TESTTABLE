<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Форма</title>
</head>
<body>

<!-- iframe чтобы не было перезагрузки -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<form 
  action="https://script.google.com/macros/s/AKfycbwThPBYjyZUF3u5B-fcD2XhntRHbjU2aMjtae67YCGEpGwxuPs1TmFKrZZPS09tByvKKQ/exec"
  method="POST"
  target="hiddenFrame"
  id="mainForm"
>

<input type="date" name="Дата" id="myDate"><br><br>

<!-- клиент -->
<input type="text" name="name" id="input1" placeholder="Клиент" list="datalist1">
<br><br>

<!-- товары -->
<div id="items">
  <input type="text" name="Товар1" placeholder="Товар" list="datalist2">
  <input type="text" name="Кількість1" placeholder="Кількість"><br><br>
</div>

<button type="button" onclick="addField()">+</button>
<br><br>

<input type="hidden" name="form" id="formType">

<button type="submit" onclick="setType('myForm')">Продажа</button>
<button type="submit" onclick="setType('myForm2')">Приход</button>

</form>

<!-- datalist -->
<datalist id="datalist1"></datalist>
<datalist id="datalist2"></datalist>

<script>


const app = "https://google.com";

// 1. Функция получения данных
function loadData(data) {
  console.log("УРА! Данные пришли:", data);
  
  const dl1 = document.getElementById('datalist1');
  const dl2 = document.getElementById('datalist2');

  if (!data.clients || !data.products) {
    console.error("В данных нет полей clients или products!", data);
    return;
  }

  data.clients.forEach(c => {
    let o = document.createElement("option");
    o.value = c;
    dl1.appendChild(o);
  });

  data.products.forEach(p => {
    let o = document.createElement("option");
    o.value = p;
    dl2.appendChild(o);
  });
  console.log("Списки в форме успешно обновлены");
}

// 2. Сама загрузка
(function() {
  console.log("Запускаю запрос к Google...");
  
  const script = document.createElement("script");
  // Добавляем t=... чтобы обмануть кэш браузера
  script.src = app + "?callback=loadData&t=" + Date.now();
  
  // Если скрипт вообще не загрузится (например, 404 или блокировка)
  script.onerror = function() {
    console.error("ОШИБКА: Не удалось загрузить скрипт по ссылке. Проверьте права доступа в Google (Anyone)!");
  };

  document.head.appendChild(script);
})();

  
</script>
</body>
</html>
