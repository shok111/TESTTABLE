<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Форма</title>
</head>
<body>

<!-- скрытый iframe чтобы не было перезагрузки -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<form 
  action="https://script.google.com/macros/s/AKfycbycUBV2AJRWj-rOjfOqPW319PExluJltXk_8CV8YqQ9mrpG27jgZHDnZd75n_xFYI6zsQ/exec"
  method="POST"
  target="hiddenFrame"
  id="mainForm"
>

  <!-- дата -->
  <input type="date" name="Дата" id="myDate"><br><br>

  <!-- клиент -->
  <input type="text" name="name" placeholder="Клиент"><br><br>

  <!-- товары -->
  <input type="text" name="Товар1" placeholder="Товар">
  <input type="text" name="Кількість1" placeholder="Кількість"><br><br>

  <input type="text" name="Товар2" placeholder="Товар">
  <input type="text" name="Кількість2" placeholder="Кількість"><br><br>

  <input type="text" name="Товар3" placeholder="Товар">
  <input type="text" name="Кількість3" placeholder="Кількість"><br><br>

  <!-- тип формы -->
  <input type="hidden" name="form" id="formType">

  <!-- кнопки -->
  <button type="submit" onclick="setType('myForm')">Продажа</button>
  <button type="submit" onclick="setType('myForm2')">Приход</button>

</form>

<script>
// сегодняшняя дата
document.getElementById('myDate').valueAsDate = new Date();

// установка типа формы
function setType(type){
  document.getElementById("formType").value = type;
}
</script>

</body>
</html>
