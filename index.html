<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Форма Продаж / Прихідна</title>
</head>
<body>
  <h2>Прихідна</h2>
  <form id="myForm2">
    <input type="date" name="Дата" id="myDate2"><br><br>
    <input type="text" name="Товар1" placeholder="Товар" list="products">
    <input type="text" name="Кількість1" placeholder="Кількість"><br><br>
    <input type="hidden" name="form" value="myForm2">
    <button type="button" onclick="addField('myForm2')">+</button>
    <button type="button" onclick="submitForm('myForm2')">Отправить</button>
  </form>

  <h2>Продаж</h2>
  <form id="myForm">
    <input type="date" name="Дата" id="myDate"><br><br>
    <input type="text" name="name" placeholder="Клиент" list="clients"><br><br>
    <input type="text" name="Товар1" placeholder="Товар" list="products">
    <input type="text" name="Кількість1" placeholder="Кількість"><br><br>
    <input type="hidden" name="form" value="myForm">
    <button type="button" onclick="addField('myForm')">+</button>
    <button type="button" onclick="submitForm('myForm')">Отправить</button>
  </form>

  <datalist id="clients"></datalist>
  <datalist id="products"></datalist>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycUBV2AJRWj-rOjfOqPW319PExluJltXk_8CV8YqQ9mrpG27jgZHDnZd75n_xFYI6zsQ/exec'; // <-- ссылка веб-приложения GAS

// подставляем текущую дату
document.getElementById('myDate').valueAsDate = new Date();
document.getElementById('myDate2').valueAsDate = new Date();

// подгружаем клиенты и товары
fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {
    const clients = document.getElementById('clients');
    const products = document.getElementById('products');
    data.clients.forEach(c => clients.appendChild(new Option(c)));
    data.products.forEach(p => products.appendChild(new Option(p)));
  });

// добавить новые поля товара/кол-во
function addField(formId) {
  const form = document.getElementById(formId);
  const count = form.querySelectorAll('input[name^="Товар"]').length + 1;
  const div = document.createElement('div');
  div.innerHTML = `<input type="text" name="Товар${count}" placeholder="Товар" list="products">
                   <input type="text" name="Кількість${count}" placeholder="Кількість"><br><br>`;
  form.insertBefore(div, form.querySelector('button[onclick^="addField"]'));
}

// отправка формы
function submitForm(formId) {
  const form = document.getElementById(formId);
  const formData = new FormData(form);
  fetch(SCRIPT_URL, {method: 'POST', body: formData})
    .then(res => res.text())
    .then(txt => alert(txt))
    .catch(err => console.error(err));
}
</script>
</body>
</html>
